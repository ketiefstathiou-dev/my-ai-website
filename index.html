<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Theomitor Bot</title>

  <style>
    :root{
      --bg1:#07130c;
      --bg2:#0b1d12;
      --card:#0f1a14cc;
      --text:#eef7f0;
      --muted:#b7c7bc;
      --accent:#9ff0b2;
      --pink:#ffb7d9;
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(159,240,178,.18), transparent 60%),
        radial-gradient(900px 600px at 80% 15%, rgba(255,183,217,.14), transparent 55%),
        radial-gradient(1000px 700px at 50% 90%, rgba(140,210,255,.10), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
      overflow-x:hidden;
    }

    /* Blossom side “trees” using CSS only */
    .scene{
      position:fixed; inset:0;
      pointer-events:none;
      z-index:0; overflow:hidden;
    }
    .trunk{
      position:absolute; top:-5vh; bottom:-10vh;
      width: 240px; opacity:.55;
    }
    .trunk.left{ left:-90px; transform: rotate(-2deg); }
    .trunk.right{ right:-90px; transform: scaleX(-1) rotate(-2deg); }
    .trunk::before{
      content:""; position:absolute; inset:0;
      background: repeating-linear-gradient(
        90deg,
        rgba(55,35,25,.75), rgba(55,35,25,.75) 10px,
        rgba(35,22,16,.75) 10px, rgba(35,22,16,.75) 20px
      );
      border-radius: 140px;
      box-shadow: inset 0 0 50px rgba(0,0,0,.45);
    }
    .canopy{
      position:absolute;
      top:-80px; left:-60px; right:-60px;
      height: 55%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,183,217,.55), transparent 45%),
        radial-gradient(circle at 55% 25%, rgba(255,183,217,.45), transparent 48%),
        radial-gradient(circle at 80% 35%, rgba(255,183,217,.50), transparent 46%),
        radial-gradient(circle at 35% 55%, rgba(255,210,230,.38), transparent 52%),
        radial-gradient(circle at 70% 60%, rgba(255,210,230,.30), transparent 55%);
      opacity:.9;
    }

    .petal{
      position:absolute;
      width: 10px; height: 8px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.7), rgba(255,183,217,.95) 40%, rgba(255,120,185,.5));
      border-radius: 70% 30% 70% 30% / 60% 40% 60% 40%;
      opacity:.85;
      animation: fall linear infinite;
      filter: blur(.15px);
    }
    @keyframes fall{
      0%{ transform: translateY(-10vh) translateX(0) rotate(0deg); opacity:0; }
      10%{ opacity:.85; }
      100%{ transform: translateY(110vh) translateX(120px) rotate(380deg); opacity:0; }
    }

    .wrap{
      position:relative; z-index:1;
      padding: 32px 14px 40px;
      max-width: 980px;
      margin: 0 auto;
    }
    .header{
      display:flex; align-items:center; justify-content:center;
      gap:12px; margin-bottom: 14px; text-align:center;
    }
    .logo{
      width:46px;height:46px; border-radius: 14px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,183,217,.95), transparent 55%),
        radial-gradient(circle at 70% 70%, rgba(159,240,178,.75), transparent 55%),
        rgba(15,26,20,.7);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
    }
    h1{ margin:0; font-size: clamp(20px, 3.3vw, 30px); }
    .sub{ margin:6px 0 0; color:var(--muted); font-size: 14px; }

    .card{
      background: var(--card);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow:hidden;
      backdrop-filter: blur(10px);
    }
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      font-size: 13px; color: var(--muted);
    }
    .dot{ width:10px;height:10px;border-radius:50%; background:#41ff8b; box-shadow: 0 0 12px rgba(65,255,139,.35); }
    .hint{ font-size: 13px; color: var(--muted); opacity:.95; }

    #messages{
      padding: 14px;
      height: min(56vh, 520px);
      overflow-y:auto;
      text-align:left;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg{ margin: 10px 0; line-height: 1.4; }
    .you b{ color:#8bd3ff; }
    .ai b{ color: var(--accent); }
    .err b{ color:#ff8b8b; }

    .sources{
      margin-top:6px;
      font-size: 13px;
      color: var(--muted);
    }
    .sources a{ color:#cfe7ff; text-decoration: underline; }
    .sources ul{ margin:6px 0 0 18px; padding:0; }

    .composer{
      display:flex; gap:10px;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.12);
    }
    input{
      flex:1;
      padding: 12px 12px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(10,14,12,.55);
      color: var(--text);
      outline:none; font-size: 15px;
    }
    input:focus{
      border-color: rgba(159,240,178,.45);
      box-shadow: 0 0 0 4px rgba(159,240,178,.12);
    }
    button{
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(135deg, rgba(159,240,178,.22), rgba(255,183,217,.18));
      color: var(--text);
      cursor:pointer; font-size: 15px; min-width: 92px;
    }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    #status{
      padding: 10px 14px;
      text-align:center;
      font-size: 13px;
      color: var(--muted);
      opacity:.95;
    }
    @media (max-width:520px){
      .badge{ display:none; }
      button{ min-width: 80px; }
      .trunk{ opacity:.42; }
    }
  </style>
</head>

<body>
  <div class="scene" aria-hidden="true">
    <div class="trunk left"><div class="canopy"></div></div>
    <div class="trunk right"><div class="canopy"></div></div>
  </div>

  <div class="wrap">
    <div class="header">
      <div class="logo"></div>
      <div>
        <h1>Theomitor Bot</h1>
        <div class="sub">Friendly school robot 🌸🌿 (with free Wikipedia/Wikidata lookup)</div>
      </div>
    </div>

    <div class="card">
      <div class="topbar">
        <div class="badge"><span class="dot"></span> Online</div>
        <div class="hint">Ask anything. For “current” facts it will use sources when available.</div>
      </div>

      <div id="messages"></div>

      <div class="composer">
        <input id="input" placeholder="Type here…" autocomplete="off" />
        <button id="sendBtn">Send</button>
      </div>

      <div id="status">Ready.</div>
    </div>
  </div>

  <script>
    const API_URL = "https://my-ai-website-iota.vercel.app/api/chat";

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function addMessage(type, who, text, sources=[]) {
      const div = document.createElement("div");
      div.className = "msg " + type;

      let sourcesHtml = "";
      if (sources && sources.length) {
        const items = sources
          .filter(s => s && s.url)
          .slice(0, 4)
          .map(s => `<li><a href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${escapeHtml(s.name || "Source")}</a></li>`)
          .join("");
        sourcesHtml = `<div class="sources"><b>Sources:</b><ul>${items}</ul></div>`;
      }

      div.innerHTML = `<b>${escapeHtml(who)}:</b> ${escapeHtml(text)}${sourcesHtml}`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const userMessage = inputEl.value.trim();
      if (!userMessage) return;

      addMessage("you", "You", userMessage);
      inputEl.value = "";
      inputEl.focus();

      sendBtn.disabled = true;
      statusEl.textContent = "Thinking…";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userMessage })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          addMessage("err", "Error", data.error || ("HTTP " + response.status));
          statusEl.textContent = "Error.";
        } else {
          addMessage("ai", "AI", data.reply ?? "(no reply)", data.sources ?? []);
          statusEl.textContent = "Ready.";
        }
      } catch (e) {
        addMessage("err", "Error", "Network error: could not reach the server.");
        statusEl.textContent = "Offline.";
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

    addMessage("ai", "AI", "Hi! I’m the friendly Theomitor School robot. Ask me anything 😊");

    // falling petals
    const scene = document.querySelector(".scene");
    const petalCount = 28;
    for (let i = 0; i < petalCount; i++) {
      const p = document.createElement("div");
      p.className = "petal";
      const left = Math.random() * 100;
      const dur = 6 + Math.random() * 8;
      const delay = -Math.random() * dur;
      const size = 7 + Math.random() * 10;
      p.style.left = left + "vw";
      p.style.animationDuration = dur + "s";
      p.style.animationDelay = delay + "s";
      p.style.width = size + "px";
      p.style.height = (size * 0.8) + "px";
      p.style.opacity = (0.55 + Math.random() * 0.35).toFixed(2);
      scene.appendChild(p);
    }
  </script>
</body>
</html>
